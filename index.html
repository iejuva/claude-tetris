<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">
      <!-- T - morado -->
      <span class="letter letter-t">
        <i style="--x:1;--y:1"></i><i style="--x:2;--y:1"></i><i style="--x:3;--y:1"></i>
        <i style="--x:2;--y:2"></i>
        <i style="--x:2;--y:3"></i>
        <i style="--x:2;--y:4"></i>
        <i style="--x:2;--y:5"></i>
      </span>
      <!-- E - amarillo -->
      <span class="letter letter-e">
        <i style="--x:1;--y:1"></i><i style="--x:2;--y:1"></i><i style="--x:3;--y:1"></i>
        <i style="--x:1;--y:2"></i>
        <i style="--x:1;--y:3"></i><i style="--x:2;--y:3"></i>
        <i style="--x:1;--y:4"></i>
        <i style="--x:1;--y:5"></i><i style="--x:2;--y:5"></i><i style="--x:3;--y:5"></i>
      </span>
      <!-- T - verde -->
      <span class="letter letter-t letter-t2">
        <i style="--x:1;--y:1"></i><i style="--x:2;--y:1"></i><i style="--x:3;--y:1"></i>
        <i style="--x:2;--y:2"></i>
        <i style="--x:2;--y:3"></i>
        <i style="--x:2;--y:4"></i>
        <i style="--x:2;--y:5"></i>
      </span>
      <!-- R - rojo -->
      <span class="letter letter-r">
        <i style="--x:1;--y:1"></i><i style="--x:2;--y:1"></i>
        <i style="--x:1;--y:2"></i><i style="--x:3;--y:2"></i>
        <i style="--x:1;--y:3"></i><i style="--x:2;--y:3"></i>
        <i style="--x:1;--y:4"></i><i style="--x:2;--y:4"></i>
        <i style="--x:1;--y:5"></i><i style="--x:3;--y:5"></i>
      </span>
      <!-- I - cyan -->
      <span class="letter letter-i">
        <i style="--x:1;--y:1"></i><i style="--x:2;--y:1"></i><i style="--x:3;--y:1"></i>
        <i style="--x:2;--y:2"></i>
        <i style="--x:2;--y:3"></i>
        <i style="--x:2;--y:4"></i>
        <i style="--x:1;--y:5"></i><i style="--x:2;--y:5"></i><i style="--x:3;--y:5"></i>
      </span>
      <!-- S - naranja -->
      <span class="letter letter-s">
        <i style="--x:2;--y:1"></i><i style="--x:3;--y:1"></i>
        <i style="--x:1;--y:2"></i>
        <i style="--x:2;--y:3"></i>
        <i style="--x:3;--y:4"></i>
        <i style="--x:1;--y:5"></i><i style="--x:2;--y:5"></i>
      </span>
    </h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
            <li><kbd>R</kbd> reiniciar</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="resume-btn" class="hidden">Reanudar</button>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
